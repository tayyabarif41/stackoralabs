    <title>StackoraLabs</title>
    <script>
      (function() {
        // Restore path from GitHub Pages 404 redirect
        var redirect = sessionStorage.getItem('gh-pages-redirect');
        if (redirect) {
          sessionStorage.removeItem('gh-pages-redirect');
          var url = new URL(redirect, window.location.origin);
          window.history.replaceState(null, '', url.pathname + url.search + url.hash);
        }
        // Restore theme
        var saved = localStorage.getItem('stackora-theme');
        var theme = saved || 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
